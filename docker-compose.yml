version: '3.8'

services:
  jekyll:
    image: jekyll/jekyll:4.2.2
    command: >
      bash -c "bundle install && bundle exec jekyll serve --host 0.0.0.0 --livereload"
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
